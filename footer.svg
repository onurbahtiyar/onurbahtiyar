<svg width="1200" height="140" viewBox="0 0 1200 140" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#1a1b27"/>
      <stop offset="100%" stop-color="#0f1419"/>
    </linearGradient>

    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7aa2f7" stop-opacity="0"/>
      <stop offset="20%" stop-color="#7aa2f7" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#bf91f3" stop-opacity="0.85"/>
      <stop offset="80%" stop-color="#38bdae" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#38bdae" stop-opacity="0"/>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="0%" r="60%">
      <stop offset="0%" stop-color="#bf91f3" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>

    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M 44 0 L 0 0 0 44" fill="none" stroke="#7aa2f7" stroke-width="0.4" opacity="0.08"/>
    </pattern>
  </defs>

  <rect width="1200" height="140" fill="url(#bg)"/>
  <rect width="1200" height="140" fill="url(#grid)"/>
  <ellipse cx="600" cy="0" rx="600" ry="90" fill="url(#glow)"/>

  <line x1="0" y1="1" x2="1200" y2="1" stroke="url(#line)" stroke-width="2"/>

  <g>
    <circle cx="160" cy="70"  r="1.4" fill="#7aa2f7"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.0s" repeatCount="indefinite"/></circle>
    <circle cx="320" cy="48"  r="1.0" fill="#bf91f3"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="480" cy="82"  r="1.2" fill="#38bdae"><animate attributeName="opacity" values="0.2;1;0.2" dur="2.7s" repeatCount="indefinite"/></circle>
    <circle cx="720" cy="48"  r="1.2" fill="#7aa2f7"><animate attributeName="opacity" values="0.3;0.9;0.3" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="880" cy="82"  r="1.4" fill="#bf91f3"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.7s" repeatCount="indefinite"/></circle>
    <circle cx="1040" cy="55" r="1.0" fill="#38bdae"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="3.4s" repeatCount="indefinite"/></circle>
  </g>

  <text x="600" y="68" text-anchor="middle" fill="#7aa2f7" font-family="'JetBrains Mono','Fira Code',monospace" font-size="14" font-weight="500" letter-spacing="4" opacity="0.9">
    &gt; thanks_for_visiting.exe
  </text>

  <text x="600" y="100" text-anchor="middle" fill="#565f89" font-family="'JetBrains Mono','Fira Code',monospace" font-size="11" font-weight="400" letter-spacing="5">
    BUILD &#xb7; SHIP &#xb7; ITERATE &#xb7; REPEAT
  </text>
</svg>

<svg width="1200" height="340" viewBox="0 0 1200 340" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="50%" stop-color="#1a1b27"/>
      <stop offset="100%" stop-color="#0f1419"/>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7aa2f7" stop-opacity="0.20"/>
      <stop offset="60%" stop-color="#bf91f3" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>

    <linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7aa2f7"/>
      <stop offset="50%" stop-color="#bf91f3"/>
      <stop offset="100%" stop-color="#38bdae"/>
    </linearGradient>

    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7aa2f7" stop-opacity="0"/>
      <stop offset="50%" stop-color="#bf91f3" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#38bdae" stop-opacity="0"/>
    </linearGradient>

    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M 44 0 L 0 0 0 44" fill="none" stroke="#7aa2f7" stroke-width="0.4" opacity="0.10"/>
    </pattern>
  </defs>

  <rect width="1200" height="340" fill="url(#bg)"/>
  <rect width="1200" height="340" fill="url(#grid)"/>
  <ellipse cx="600" cy="170" rx="500" ry="200" fill="url(#glow)"/>

  <g>
    <circle cx="120" cy="60"  r="1.6" fill="#7aa2f7"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.0s" repeatCount="indefinite"/></circle>
    <circle cx="220" cy="130" r="1.2" fill="#bf91f3"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="3.6s" repeatCount="indefinite"/></circle>
    <circle cx="340" cy="60"  r="1.0" fill="#38bdae"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.7s" repeatCount="indefinite"/></circle>
    <circle cx="450" cy="265" r="1.4" fill="#7aa2f7"><animate attributeName="opacity" values="0.3;1;0.3" dur="3.4s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="60"  r="1.4" fill="#bf91f3"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="820" cy="245" r="1.0" fill="#38bdae"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="2.9s" repeatCount="indefinite"/></circle>
    <circle cx="930" cy="100" r="1.8" fill="#7aa2f7"><animate attributeName="opacity" values="0.2;1;0.2" dur="3.8s" repeatCount="indefinite"/></circle>
    <circle cx="1050" cy="200" r="1.4" fill="#bf91f3"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="170" cy="245" r="1.0" fill="#38bdae"><animate attributeName="opacity" values="0.3;0.8;0.3" dur="3.3s" repeatCount="indefinite"/></circle>
    <circle cx="1100" cy="80" r="1.0" fill="#7aa2f7"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="3.5s" repeatCount="indefinite"/></circle>
  </g>

  <line x1="0" y1="70" x2="1200" y2="70" stroke="url(#line)" stroke-width="1"/>

  <text x="600" y="115" text-anchor="middle" fill="#7aa2f7" font-family="'JetBrains Mono','Fira Code',monospace" font-size="14" font-weight="500" letter-spacing="4" opacity="0.85">
    &gt; whoami
  </text>

  <text x="600" y="195" text-anchor="middle" fill="url(#title)" font-family="'JetBrains Mono','Fira Code',monospace" font-size="62" font-weight="800" letter-spacing="2">
    Onur Bahtiyar
  </text>

  <text x="600" y="235" text-anchor="middle" fill="#c0caf5" font-family="'JetBrains Mono','Fira Code',monospace" font-size="20" font-weight="500" letter-spacing="2">
    Technical Lead &#xb7; AI &amp; Digital Transformation
  </text>

  <text x="600" y="280" text-anchor="middle" fill="#565f89" font-family="'JetBrains Mono','Fira Code',monospace" font-size="12" font-weight="500" letter-spacing="6">
    AI &#xb7; ARCHITECTURE &#xb7; FULL-STACK &#xb7; CLOUD
  </text>

  <line x1="0" y1="315" x2="1200" y2="315" stroke="url(#line)" stroke-width="1"/>

  <text x="40" y="333" fill="#414868" font-family="'JetBrains Mono','Fira Code',monospace" font-size="11" letter-spacing="2">
    SAKARYA, TR
  </text>
  <text x="1160" y="333" text-anchor="end" fill="#414868" font-family="'JetBrains Mono','Fira Code',monospace" font-size="11" letter-spacing="2">
    EST. 2018
  </text>
</svg>
